name: Build APK & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "ERROR: KEYSTORE_BASE64 secret is empty!"
            exit 1
          fi
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > app/release-keystore.jks
          SIZE=$(wc -c < app/release-keystore.jks)
          echo "Keystore decoded: $SIZE bytes"
          if [ "$SIZE" -lt 100 ]; then
            echo "ERROR: Keystore too small, decode likely failed"
            exit 1
          fi
          file app/release-keystore.jks

      - name: Build signed Release APK
        run: |
          ./gradlew assembleRelease --no-daemon --build-cache \
            -x lintVitalRelease \
            -PRELEASE_STORE_FILE=release-keystore.jks \
            -PRELEASE_STORE_PASSWORD="${{ secrets.RELEASE_STORE_PASSWORD }}" \
            -PRELEASE_KEY_ALIAS="${{ secrets.RELEASE_KEY_ALIAS }}" \
            -PRELEASE_KEY_PASSWORD="${{ secrets.RELEASE_KEY_PASSWORD }}"

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)
          CURRENT_TAG=${GITHUB_REF#refs/tags/}
          {
            echo "## What's Changed in ${CURRENT_TAG}"
            echo ""
            echo "### Features"
            git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --grep="^[Aa]dd\|^[Ff]eat\|^[Nn]ew" | head -50 || true
            echo ""
            echo "### Bug Fixes"
            git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --grep="^[Ff]ix\|^[Bb]ug" | head -50 || true
            echo ""
            echo "### Other Changes"
            git log ${PREV_TAG}..HEAD --pretty=format:"- %s" --invert-grep --grep="^[Aa]dd\|^[Ff]eat\|^[Nn]ew\|^[Ff]ix\|^[Bb]ug" | head -50 || true
            echo ""
            echo "---"
            echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${CURRENT_TAG}"
          } > CHANGESET.md

      - name: Rename APK
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          cp app/build/outputs/apk/release/app-release.apk Eye2020-${VERSION}-release.apk 2>/dev/null || \
          cp app/build/outputs/apk/release/*.apk Eye2020-${VERSION}-release.apk 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Eye2020 ${{ steps.version.outputs.VERSION }}"
          body_path: CHANGESET.md
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-rc') || contains(github.ref, '-alpha') }}
          files: Eye2020-*.apk
